name: Release

on:
  push:
    branches:
      - release

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra db --extra embed --extra embed-clamp3 --extra api --group dev

      - name: Run tests
        run: uv run pytest tests/ -v

  docker:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - variant: cpu
            dockerfile: Dockerfile
            tag_suffix: latest
          - variant: gpu
            dockerfile: Dockerfile.gpu
            tag_suffix: cuda
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(grep -E '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Use the host Docker daemon instead of pulling moby/buildkit from
          # Docker Hub (avoids registry-1.docker.io timeouts on GH runners).
          driver: docker

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository }}"
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"

          if [ "${{ matrix.variant }}" = "cpu" ]; then
            TAGS="${IMAGE}:latest,${IMAGE}:v${VERSION},${IMAGE}:${VERSION},${IMAGE}:sha-${SHORT_SHA}"
          else
            TAGS="${IMAGE}:cuda,${IMAGE}:v${VERSION}-cuda,${IMAGE}:${VERSION}-cuda,${IMAGE}:sha-${SHORT_SHA}-gpu"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}

      - name: Report image size
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
          docker images "${IMAGE}" --format 'table {{.Tag}}\t{{.Size}}' || true

  github-release:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(grep -E '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping."
            exit 0
          fi

          gh release create "$TAG" \
            --repo "$REPO" \
            --title "Harmony Engine $TAG" \
            --notes "$(cat <<EOF
          ## Docker images

          Pull from GitHub Container Registry:

          \`\`\`bash
          # CPU
          docker pull ghcr.io/${REPO}:latest
          docker pull ghcr.io/${REPO}:v${{ steps.version.outputs.version }}

          # GPU (CUDA 12.1)
          docker pull ghcr.io/${REPO}:cuda
          docker pull ghcr.io/${REPO}:v${{ steps.version.outputs.version }}-cuda
          \`\`\`

          ### Quick start

          \`\`\`bash
          export MUSIC_PATH=~/music
          docker compose up -d
          \`\`\`

          See [docs/docker.md](https://github.com/${REPO}/blob/release/docs/docker.md) for full instructions.
          EOF
          )"
